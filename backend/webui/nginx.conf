server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Device list (read-only) served alongside the UI.
    location = /config.json {
        alias /usr/share/nginx/html/config.json;
        default_type application/json;
        add_header Cache-Control "no-store";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: proxy Grafana so the whole UI is served from one origin
    # (avoids browser mixed-content / embedding friction). Disabled by default;
    # the page embeds Grafana by absolute URL instead. Uncomment to enable.
    # location /grafana/ {
    #     proxy_pass http://grafana:3000/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }
}
