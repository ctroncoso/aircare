name: Deploy Web Updater to Pages

on:
  push:
    branches: ["main"] # Triggers whenever you push changes to main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      # 👇 THIS LINE IS THE MAGIC: Change 'webupdate' to match your folder name precisely
      - name: Upload Folder Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './webupdate' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4