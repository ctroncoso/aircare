; diag/platformio.ini — standalone I2C / sensor diagnostic (offline, serial only).
;
; Separate project so it does NOT compile the firmware in ../src. Reuses the
; sensor wrappers copied into diag/src/ and the hardware constants from
; ../src/core/board.h via an include path. No WiFi/MQTT/OTA.
;
; Build/flash from the repo root:
;   pio run -e diag --project-dir diag
;   pio run -e diag --project-dir diag --target upload --upload-port /dev/ttyUSB0
;   pio device monitor --project-dir diag

[env:diag]
platform = espressif32 @ 6.7.0
board = esp32dev
framework = arduino
build_unflags = -std=*
build_flags =
    -std=gnu++17
    -I${PROJECT_DIR}/src
    -I${PROJECT_DIR}/../src/core
monitor_speed = 115200
monitor_filters =
    default
    time
lib_deps =
    adafruit/Adafruit BME280 Library@^2.2.2
