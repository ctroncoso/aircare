<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizador firmware ESP32</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 40px auto;
            max-width: 700px;
            /* Expanded interface width */
            line-height: 1.6;
            background-color: #f4f7f6;
            color: #333;
        }

        .card {
            border: 1px solid #e0e0e0;
            padding: 30px;
            border-radius: 12px;
            background: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        h2 {
            margin-top: 0;
            color: #24292e;
        }

        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        button {
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            transition: background 0.2s, transform 0.1s;
            margin-bottom: 10px;
        }

        #flashBtn {
            background: #2ea44f;
        }

        #flashBtn:hover {
            background: #2c974b;
        }

        #terminalBtn {
            background: #0366d6;
        }

        #terminalBtn:hover {
            background: #0255b3;
        }

        button:disabled {
            background: #ccc !important;
            cursor: not-allowed;
        }

        button:active:not(:disabled) {
            transform: scale(0.98);
        }

        #log {
            background: #1e1e1e;
            color: #39ff14;
            padding: 15px;
            border-radius: 6px;
            height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            margin-top: 15px;
            text-align: left;
            white-space: pre-wrap;
            font-size: 13px;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Actualizador firmware ESP32</h2>
        <p>Conecte el ESP32 via cable USB y seleccione una opción:</p>

        <button id="flashBtn">Conecte y actualice la APP</button>
        <button id="terminalBtn">Ver Terminal Serial</button>

        <div id="log">Ready. Connect device to begin...</div>
    </div>

    <script type="module">
        import { ESPLoader, Transport } from 'https://cdn.jsdelivr.net/npm/esptool-js/bundle.js';

        const logDiv = document.getElementById('log');
        const flashBtn = document.getElementById('flashBtn');
        const terminalBtn = document.getElementById('terminalBtn');
        const FIRMWARE_URL = './firmware.bin';

        function log(msg) {
            logDiv.innerText += msg + '\n';
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function setButtonsDisabled(state) {
            flashBtn.disabled = state;
            terminalBtn.disabled = state;
        }

        // --- Reusable Serial Terminal Monitor Logic ---
        async function startTerminalMonitor(port, shouldReset = false) {
            try {
                // If the port is already open, close it first
                if (port.readable) {
                    await port.close();
                }

                // Open port cleanly at application runtime rate
                await port.open({ baudRate: 115200 });

                if (shouldReset) {
                    // Force a hardware reset toggle on the ESP32 EN/RST wire so it boots cleanly
                    await port.setSignals({ dataTerminalReady: false, requestToSend: true });
                    await new Promise(resolve => setTimeout(resolve, 100));
                    await port.setSignals({ dataTerminalReady: false, requestToSend: false });
                    log("\n--- TERMINAL ABIERTA (Reiniciando dispositivo...) ---\n");
                } else {
                    log("\n--- TERMINAL ABIERTA (Conexión directa, sin reinicio) ---\n");
                }

                const textDecoder = new TextDecoderStream();
                const readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
                const reader = textDecoder.readable.getReader();

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) {
                        reader.releaseLock();
                        break;
                    }
                    if (value) {
                        logDiv.innerText += value;
                        logDiv.scrollTop = logDiv.scrollHeight;
                    }
                }
            } catch (err) {
                log(`\n❌ Error de Terminal: ${err.message}`);
                setButtonsDisabled(false);
            }
        }

        // --- BUTTON 1: Flash & Then Monitor ---
        flashBtn.addEventListener('click', async () => {
            logDiv.innerText = '';
            setButtonsDisabled(true);

            let port;
            let transport;

            try {
                log("🔌 Por favor, selecione su conección al ESP32 de la ventana emergente...");
                port = await navigator.serial.requestPort();
                transport = new Transport(port, true);

                log("📥 Downloading firmware.bin from server...");
                const response = await fetch(FIRMWARE_URL);
                if (!response.ok) throw new Error(`Could not find firmware.bin on server. (Status: ${response.status})`);
                const buffer = await response.arrayBuffer();
                log(`✅ Se descargaron (${(buffer.byteLength / 1024 / 1024).toFixed(2)} MB) a la memoria del browser.`);

                log("⚡ Conectando al chip...");
                const esploader = new ESPLoader({
                    transport: transport,
                    baudrate: 460800,
                    terminal: {
                        clean: () => logDiv.innerText = '',
                        write: (data) => logDiv.innerText += data,
                        writeLine: (data) => logDiv.innerText += data + '\n'
                    }
                });

                const chip = await esploader.main();
                log(`\n💻 Chip detectado: ${chip}`);

                const firmwareData = new Uint8Array(buffer);
                const flashOptions = {
                    fileArray: [{ data: firmwareData, address: 0x10000 }],
                    flashSize: 'keep',
                    flashMode: 'keep',
                    flashFreq: 'keep',
                    eraseAll: false,
                    compress: true,
                    reportProgress: (fileIndex, written, total) => {
                        log(`Progreso de escritura: ${((written / total) * 100).toFixed(1)}%`);
                    }
                };

                log("🚀 Escribiendo firmware a 0x10000... NO DESCONECTAR!");
                await esploader.writeFlash(flashOptions);

                log("\n🎉 EXITO! Su ESP32 ha sido actualizado con éxito.");

                log("\n🔄 Reiniciando dispositivo e iniciando terminal...");
                await transport.disconnect();
                await new Promise(resolve => setTimeout(resolve, 500));

                // Start terminal and pass 'true' to trigger a reset after flashing
                await startTerminalMonitor(port, true);

            } catch (err) {
                log(`\n❌ Error: ${err.message}`);
                console.error(err);
                setButtonsDisabled(false);
            }
        });

        // --- BUTTON 2: Monitor Only ---
        terminalBtn.addEventListener('click', async () => {
            logDiv.innerText = '';
            setButtonsDisabled(true);

            try {
                log("🔌 Seleccione el puerto serial para escuchar...");
                const port = await navigator.serial.requestPort();

                // Directly launch terminal stream loop with 'false' to avoid hardware resetting
                await startTerminalMonitor(port, false);
            } catch (err) {
                log(`\n❌ Error: ${err.message}`);
                setButtonsDisabled(false);
            }
        });
    </script>
</body>

</html>
